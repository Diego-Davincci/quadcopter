; ============================================================
;  Microcuadricóptero brushed — Configuración PlatformIO
; ============================================================
;  Un solo proyecto, dos targets. El código vive en src/ y es
;  portable: para cambiar de placa solo cambias el entorno con
;  el que compilas/flasheas, NO el código.
;
;    pio run -e esp32            -> compila para el ESP32
;    pio run -e esp32 -t upload  -> flashea el ESP32
;
;  En VS Code, la barra inferior de PlatformIO te deja elegir el
;  entorno activo con un clic (botón "Default (microquad)").
;
;  ESTADO: el ESP32 ya está disponible -> es la plataforma PRINCIPAL.
;  El Uno queda como entorno OPCIONAL (respaldo / comparación didáctica).
; ============================================================
 
[platformio]
default_envs = esp32

; ---- Ajustes COMUNES a todas las placas ----
; Todo lo que ponemos aquí lo heredan uno y esp32, así no repetimos.
[env]
framework = arduino

; 115200 baudios: es la velocidad nativa del ESP32 (sus mensajes de
; arranque salen a 115200). Lo fijamos igual en ambas placas para que
; el flujo sea idéntico.
monitor_speed = 115200

; Filtros útiles del monitor: marca de tiempo y log de reset.
monitor_filters = default, time

; (vacío en Fase 0; aquí entrará la MPU-6050 en la Fase 1)
lib_deps = 

; ---- TARGET PRINCIPAL: ESP32 WROOM-32 (controlador de vuelo final) ----
[env:esp32]
platform = espressif32

; 'esp32doit-devkit-v1' = placa DOIT de 30 pines (la tuya).
; Si tuvieras problemas de identificación, 'esp32dev' es el genérico.
board = esp32doit-devkit-v1

; Xtensa LX6 doble núcleo @ 240 MHz, FPU por hardware, lógica 3.3 V,
; ~520 KB SRAM, WiFi/BT.
;
; Decodifica los stack traces de un crash a archivo:línea (oro puro
; para depurar). Solo aplica al ESP32, por eso va en este entorno.
monitor_filters = esp32_exception_decoder, default, time
